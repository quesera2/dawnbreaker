name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'renovate') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Upload generated files
        uses: actions/upload-artifact@v7
        with:
          name: generated-files
          path: |
            lib/**/*.g.dart
            lib/**/*.freezed.dart

  unit-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Download generated files
        uses: actions/download-artifact@v8
        with:
          name: generated-files
          path: lib/

      - name: Install junitreport
        run: dart pub global activate junitreport

      - name: Run tests
        run: flutter test --coverage --machine | tojunit --output report.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: report.xml

  integration-test-ios:
    if: false # flakyなため無効化
    needs: build
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Download generated files
        uses: actions/download-artifact@v8
        with:
          name: generated-files
          path: lib/

      - name: Boot iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | jq -r '.devices | to_entries[].value[] | select(.name | test("iPhone")) | .udid' \
            | head -1)
          xcrun simctl boot "$UDID"
          open -a Simulator
          xcrun simctl bootstatus "$UDID" -b
          echo "SIM_UDID=$UDID" >> $GITHUB_ENV

      - name: Run integration tests
        run: flutter test integration_test/ -d $SIM_UDID

  integration-test-android:
    if: false # flakyなため無効化
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Download generated files
        uses: actions/download-artifact@v8
        with:
          name: generated-files
          path: lib/

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          script: flutter test integration_test/ -d emulator-5554
